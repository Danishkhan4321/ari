<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title description">
  <title id="title">Ari hosted AI workspace dashboard</title>
  <desc id="description">Ari dashboard showing an AI work session, CRM, team, meetings, and workspace navigation.</desc>
  <defs>
    <linearGradient id="page" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#f7f5f0"/><stop offset="1" stop-color="#e8e9ec"/></linearGradient>
    <linearGradient id="accent" x1="0" x2="1"><stop stop-color="#0a0a0a"/><stop offset="1" stop-color="#242424"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#171717" flood-opacity=".14"/></filter>
    <style>
      .t { font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #25212c; }
      .muted { font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; fill: #777181; }
      .small { font-size: 15px; } .body { font-size: 18px; } .title { font-size: 30px; font-weight: 700; } .label { font-size: 14px; font-weight: 700; letter-spacing: 1.4px; }
    </style>
  </defs>
  <rect width="1440" height="900" fill="url(#page)"/>
  <circle cx="1312" cy="100" r="230" fill="#f7dd2a" opacity=".22"/>
  <circle cx="160" cy="810" r="250" fill="#f5e7b6" opacity=".45"/>
  <g filter="url(#shadow)">
    <rect x="56" y="58" width="1328" height="782" rx="28" fill="#fff"/>
    <rect x="56" y="58" width="288" height="782" rx="28" fill="#faf9f4"/>
    <path d="M344 58h1012v782H344z" fill="#fff"/>
  </g>
  <g>
    <rect x="80" y="88" width="56" height="56" rx="18" fill="#251a32"/>
    <path d="M109 101l-12 21h10l-2 12 15-23h-10z" fill="#fff"/>
    <text x="152" y="112" class="t title" font-size="25">Ari</text>
    <text x="152" y="136" class="muted small">AI work OS</text>
    <rect x="80" y="176" width="240" height="58" rx="14" fill="#fffdf6" stroke="#dfc863" stroke-width="2"/>
    <text x="108" y="212" class="t body" font-weight="700">＋  New session</text>
    <rect x="80" y="256" width="240" height="48" rx="12" fill="#f1ecc5"/>
    <text x="108" y="287" class="t body" font-weight="700">◌  Home</text>
    <text x="108" y="343" class="t body">▣  CRM</text>
    <text x="108" y="397" class="t body">♧  Team</text>
    <text x="108" y="451" class="t body">▣  Meetings</text>
    <text x="108" y="505" class="t body">⌁  Flowtype</text>
    <text x="108" y="559" class="t body">□  Personal workspace</text>
    <text x="80" y="626" class="muted label">RECENT SESSIONS</text>
    <text x="80" y="668" class="t small">Launch a CRM campaign</text>
    <text x="80" y="706" class="t small">Plan team priorities</text>
    <text x="80" y="744" class="t small">Review meeting actions</text>
    <line x1="80" y1="780" x2="320" y2="780" stroke="#e7e2d9"/>
    <circle cx="108" cy="808" r="17" fill="#251a32"/>
    <text x="138" y="813" class="t small" font-weight="700">Personal workspace</text>
  </g>
  <g>
    <text x="390" y="122" class="muted label">AI WORKSPACE</text>
    <text x="390" y="164" class="t title">What should we work on today?</text>
    <text x="390" y="194" class="muted body">Coordinate your customer, team, and meeting work in one place.</text>
    <rect x="390" y="232" width="236" height="52" rx="14" fill="#f4f0cf"/>
    <text x="414" y="265" class="t small" font-weight="700">Review CRM follow-ups</text>
    <rect x="642" y="232" width="220" height="52" rx="14" fill="#fff7df"/>
    <text x="666" y="265" class="t small" font-weight="700">Create a campaign</text>
    <rect x="878" y="232" width="232" height="52" rx="14" fill="#edf7f1"/>
    <text x="902" y="265" class="t small" font-weight="700">Plan team priorities</text>
    <g filter="url(#shadow)">
      <rect x="390" y="324" width="910" height="264" rx="20" fill="#fff" stroke="#dfddda"/>
    </g>
    <circle cx="430" cy="368" r="20" fill="url(#accent)"/>
    <path d="M430 355l-8 14h7l-1 9 10-15h-7z" fill="#fff"/>
    <text x="466" y="366" class="t body" font-weight="700">Ari</text>
    <text x="466" y="394" class="t body">I found 24 leads that need a follow-up this week.</text>
    <text x="466" y="426" class="muted body">I can group them by segment, create a campaign draft,</text>
    <text x="466" y="454" class="muted body">and add the highest-priority conversations to your team plan.</text>
    <rect x="466" y="486" width="162" height="42" rx="12" fill="#251a32"/>
    <text x="488" y="513" fill="#fff" class="small" font-family="Inter, sans-serif" font-weight="700">Review groups</text>
    <rect x="642" y="486" width="204" height="42" rx="12" fill="#fff" stroke="#dfddda"/>
    <text x="664" y="513" class="t small" font-weight="700">Create campaign draft</text>
    <rect x="390" y="620" width="910" height="132" rx="20" fill="#fff" stroke="#d9c54f" stroke-width="2"/>
    <text x="422" y="664" class="muted body">Ask Ari to do anything across your workspace</text>
    <text x="422" y="714" class="t body">＋</text>
    <circle cx="1248" cy="696" r="26" fill="#eeeadd"/>
    <path d="M1248 680v26m-10-10l10-10 10 10" fill="none" stroke="#6a6471" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <rect x="1112" y="92" width="212" height="38" rx="19" fill="#f4f0cf"/>
  <circle cx="1135" cy="111" r="7" fill="#0a0a0a"/>
  <text x="1150" y="116" class="t small" font-weight="700">Hosted workspace</text>
</svg>
