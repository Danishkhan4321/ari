name: Release desktop apps

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  ARI_DESKTOP_DASHBOARD_URL: ${{ vars.ARI_DESKTOP_DASHBOARD_URL || 'https://app.98-89-55-116.sslip.io' }}

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            script: build:win
            artifact: Ari Windows Installer
            files: |
              desktop/dist/Ari-Setup-*.exe
              desktop/dist/Ari-Setup-*.exe.blockmap
              desktop/dist/latest.yml
          - platform: macos
            runner: macos-latest
            script: build:mac
            artifact: Ari macOS Installer
            files: |
              desktop/dist/*.dmg
              desktop/dist/*.zip
              desktop/dist/*.blockmap
              desktop/dist/latest-mac.yml

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix desktop

      - name: Run desktop tests
        run: npm test --prefix desktop

      - name: Build desktop app
        run: npm run ${{ matrix.script }} --prefix desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Normalize Windows installer filenames
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $dist = "desktop/dist"
          $installer = Get-ChildItem -Path $dist -Filter "Ari Setup *.exe" | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) { throw "Windows installer not found" }
          $normalizedName = $installer.Name -replace ' ', '-'
          $normalizedInstaller = Join-Path $dist $normalizedName
          Copy-Item -LiteralPath $installer.FullName -Destination $normalizedInstaller
          $blockmap = "$($installer.FullName).blockmap"
          if (Test-Path -LiteralPath $blockmap) {
            Copy-Item -LiteralPath $blockmap -Destination "$normalizedInstaller.blockmap"
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error

      - name: Attach artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.files }}
