services:
  ari:
    build: .
    container_name: ari-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # The dashboard writer and bot/Agno reader must see this same absolute
      # path. Mount this volume at the same path in a separate dashboard
      # container if one is added.
      - ARI_SESSION_ATTACHMENT_DIR=/app/.ari-session-attachments
    volumes:
      - ./logs:/app/logs
      - ./.ari-session-attachments:/app/.ari-session-attachments
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'
