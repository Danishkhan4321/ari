<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Starting Ari</title>
  <style>
    :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5f2e9;
      color: #211f1b;
    }
    main {
      width: min(390px, calc(100vw - 48px));
      padding: 32px;
      border: 1px solid #e4ded3;
      border-radius: 18px;
      background: #fffdf8;
      box-shadow: 0 20px 55px rgba(33, 31, 27, .08), 0 2px 8px rgba(33, 31, 27, .04);
    }
    h1 { display: flex; align-items: center; margin: 0 0 8px; font-size: 25px; letter-spacing: -.035em; }
    p { margin: 0; line-height: 1.55; color: #777167; }
    .dot { width: 9px; height: 9px; margin-right: 12px; border-radius: 50%; background: #f4d000; box-shadow: 0 0 0 5px rgba(244, 208, 0, .18); animation: pulse 1.4s ease-in-out infinite; }
    .actions { display: none; gap: 10px; margin-top: 24px; }
    body[data-state="error"] .actions { display: flex; }
    body[data-state="error"] .dot { background: #dc2626; box-shadow: 0 0 0 5px rgba(254, 202, 202, .55); animation: none; }
    button { border: 1px solid #d8ba00; border-radius: 9px; padding: 10px 15px; background: #f4d000; color: #211f1b; font: inherit; font-weight: 700; cursor: pointer; box-shadow: 0 7px 16px rgba(33, 31, 27, .08); }
    button:last-child { color: #211f1b; background: #fffdf8; border-color: #ddd7cc; box-shadow: none; }
    button:focus-visible { outline: 3px solid rgba(244, 208, 0, .35); outline-offset: 2px; }
    @keyframes pulse { 50% { opacity: .55; transform: scale(.88); } }
    @media (prefers-reduced-motion: reduce) { .dot { animation: none; } }
  </style>
</head>
<body>
  <main>
    <h1><span class="dot"></span><span id="title">Starting Ari</span></h1>
    <p id="message">Preparing your local dashboard&hellip;</p>
    <div class="actions"><button id="retry">Retry</button><button id="quit">Quit</button></div>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    if (params.get('error')) {
      document.body.dataset.state = 'error';
      document.getElementById('title').textContent = 'Ari could not start';
      document.getElementById('message').textContent = params.get('error');
    }
    document.getElementById('retry').addEventListener('click', () => window.ariDesktop.retry());
    document.getElementById('quit').addEventListener('click', () => window.ariDesktop.quit());
  </script>
</body>
</html>
